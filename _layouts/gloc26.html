<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default: "GLOC26" }}</title>
    <style>
      :root {
        --bg: #0b1020;
        --bg-soft: #121a33;
        --text: #e6edf7;
        --muted: #a8b3c7;
        --accent: #6ee7ff;
        --border: #2b3754;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #162241 0%, var(--bg) 55%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.65;
      }

      .page {
        width: min(900px, 92vw);
        margin: 3rem auto;
        background: linear-gradient(180deg, rgba(18, 26, 51, 0.95) 0%, rgba(11, 16, 32, 0.95) 100%);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 2rem;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      }

      h1,
      h2,
      h3 {
        color: #f7fbff;
        line-height: 1.25;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.7rem, 2.8vw, 2.2rem);
      }

      h2 {
        margin-top: 1.7rem;
      }

      h3 {
        margin-top: 1.4rem;
      }

      p,
      li {
        color: var(--text);
      }

      ul,
      ol {
        padding-left: 1.3rem;
      }

      strong {
        color: var(--accent);
      }

      a {
        color: var(--accent);
      }

      a:hover {
        text-decoration: none;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 1.4rem 0;
      }
    </style>
  </head>
  <body>
    <main class="page">
      {{ content }}
    </main>
  </body>
</html>
